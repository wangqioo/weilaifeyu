<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关键词坐标图生成器 · 未来法域</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f0ede8;
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  padding: 24px;
}
.toolbar {
  max-width: 740px;
  margin: 0 auto 16px;
  background: #fff;
  border: 1px solid #e0ddd6;
  border-radius: 8px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.toolbar-title {
  font-size: 14px;
  font-weight: 700;
  color: #2d5a27;
  flex: 1;
  min-width: 200px;
}
.toolbar-note {
  font-size: 11px;
  color: #999;
  flex: 2;
  min-width: 200px;
}
.btn {
  background: #2d5a27;
  color: #fff;
  border: none;
  padding: 8px 20px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.btn:hover { background: #245220; }
.btn-sec {
  background: #f4f8f3;
  color: #2d5a27;
  border: 1px solid #aec9ab;
}
.btn-sec:hover { background: #e8f2e6; }
.canvas-wrap {
  max-width: 740px;
  margin: 0 auto;
  background: #fff;
  border: 1px solid #e0ddd6;
  border-radius: 8px;
  padding: 12px;
}
canvas { display: block; width: 100%; }
.legend {
  max-width: 740px;
  margin: 12px auto 0;
  display: flex;
  gap: 20px;
  font-size: 11px;
  color: #888;
  flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-title">关键词坐标图生成器 · 未来法域全图</div>
  <div class="toolbar-note">编辑脚本顶部的 ISSUE 和 KEYWORDS 数据，保存后刷新页面即可更新图表</div>
  <button class="btn btn-sec" onclick="copyBase64()">复制 Base64</button>
  <button class="btn" onclick="downloadChart()">下载 PNG</button>
</div>

<div class="canvas-wrap">
  <canvas id="chart"></canvas>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#2d5a27"></span> 科技产业</div>
  <div class="legend-item"><span class="legend-dot" style="background:#1a4a6e"></span> 法律监管</div>
  <div class="legend-item"><span class="legend-dot" style="background:#8a6012"></span> 政治经济</div>
  <div style="margin-left:auto;color:#bbb;">横轴：地理维度（左=中国内 / 中=跨境 / 右=国际）· 纵轴：议题维度 · 坐标仅示意</div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  每期编辑这里：ISSUE（期刊信息）+ KEYWORDS（关键词数组）
// ══════════════════════════════════════════════════════════════

const ISSUE = {
  column: "全图",       // 栏目名
  vol:    "Vol.002",    // 期号
  period: "2026.03.17–03.23",  // 日期范围
};

// 关键词格式：["显示标签", x坐标, y坐标]
//
// x 轴（地理维度，仅示意）：
//   -2.0 ~ -0.6  →  中国内
//   -0.6 ~  0.6  →  跨境/交叉
//    0.6 ~  2.0  →  国际
//
// y 轴（议题维度，仅示意）：
//   -2.0 ~ -0.6  →  政治经济  （颜色：棕色）
//   -0.6 ~  0.6  →  法律监管  （颜色：深蓝）
//    0.6 ~  2.0  →  科技产业  （颜色：松绿）
//
// 不必追求精确，用感觉放置，偏左就是偏国内，偏上就是偏科技。

const KEYWORDS = [

  // ── 中国内 + 科技产业 ──
  ["微信ClawBot插件",    -1.40,  0.85],
  ["字节Seedance2.0",    -1.10,  1.18],
  ["智谱龙虾大模型",     -1.62,  1.48],
  ["风云四号C星",        -1.85,  1.25],
  ["捷龙三号海上发射",   -1.52,  1.70],
  ["宇树科技IPO",        -0.88,  0.78],

  // ── 中国内 + 法律监管 ──
  ["国安部OpenClaw手册", -1.68,  0.38],
  ["网信办拟人化AI办法", -1.22,  0.18],
  ["金融法草案",         -1.82,  0.02],
  ["最高法院未成年指引", -1.75, -0.18],
  ["中植破产重整",       -1.45, -0.42],

  // ── 中国内 + 政治经济 ──
  ["十五五规划",         -1.40, -0.75],
  ["金监总局房地产",     -1.60, -1.05],
  ["字节跳动出售沐瞳",   -0.88, -0.88],

  // ── 跨境 + 政治经济 ──
  ["中美巴黎磋商",        0.12, -1.32],
  ["特朗普推迟访华",      0.22, -1.05],

  // ── 跨境 + 法律监管 ──
  ["TCL诉三星OLED",       0.10,  0.12],
  ["港证监虚拟资产指引",  -0.22,  0.02],
  ["美国恶名市场名单",    0.52, -0.25],

  // ── 国际 + 政治经济 ──
  ["霍尔木兹消耗战",      1.52, -1.78],
  ["48小时通牒",          1.22, -1.52],
  ["黑色星期一",          0.88, -1.20],
  ["欧盟谴责以色列",      1.68, -1.08],
  ["KOSPI熔断",           1.35, -0.92],

  // ── 国际 + 科技产业 ──
  ["英伟达GTC推理芯片",   1.45,  1.88],
  ["Token新大宗商品",     1.18,  1.58],
  ["三星730亿AI投资",     1.65,  1.38],

];

// ══════════════════════════════════════════════════════════════
//  以下渲染代码无需修改（除非要调整整体尺寸/配色）
// ══════════════════════════════════════════════════════════════

const COLORS = {
  tech:   { dot: '#2d5a27', text: '#1e4a1e', fill: 'rgba(45,90,39,0.07)'  },
  law:    { dot: '#1a4a6e', text: '#0e3458', fill: 'rgba(26,74,110,0.05)' },
  poly:   { dot: '#8a6012', text: '#5a400a', fill: 'rgba(160,120,20,0.07)'},
  axis:   '#b8b0a4',
  grid:   '#ccc8c0',
  border: '#e0ddd6',
  brand:  '#2d5a27',
};

// Canvas dimensions (physical pixels, high-DPI friendly)
const CW = 700, CH = 480;
const DPR = window.devicePixelRatio || 1;

const cv = document.getElementById('chart');
cv.width  = CW * DPR;
cv.height = CH * DPR;
cv.style.height = 'auto';  // let CSS control display size

const ctx = cv.getContext('2d');
ctx.scale(DPR, DPR);

const PAD = { L: 68, R: 20, T: 54, B: 52 };
const PW = CW - PAD.L - PAD.R;  // plot width
const PH = CH - PAD.T - PAD.B;  // plot height
const RANGE = 2.0;
const FONT = '"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif';

// Zone separator values
const XZ1 = -0.6, XZ2 = 0.6;
const YZ1 = -0.6, YZ2 = 0.6;

function cx(x) { return PAD.L + (x + RANGE) / (2 * RANGE) * PW; }
function cy(y) { return CH - PAD.B - (y + RANGE) / (2 * RANGE) * PH; }

function zoneColor(y) {
  if (y >  YZ2) return COLORS.tech;
  if (y >= YZ1) return COLORS.law;
  return COLORS.poly;
}

function drawChart() {
  ctx.clearRect(0, 0, CW, CH);

  // White background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CW, CH);

  // ── Zone fills ──
  ctx.fillStyle = COLORS.tech.fill;
  ctx.fillRect(PAD.L, PAD.T, PW, cy(YZ2) - PAD.T);

  ctx.fillStyle = COLORS.law.fill;
  ctx.fillRect(PAD.L, cy(YZ2), PW, cy(YZ1) - cy(YZ2));

  ctx.fillStyle = COLORS.poly.fill;
  ctx.fillRect(PAD.L, cy(YZ1), PW, CH - PAD.B - cy(YZ1));

  // ── Zone dividers (dashed) ──
  ctx.save();
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 0.8;
  ctx.setLineDash([3, 5]);
  [XZ1, XZ2].forEach(xv => {
    ctx.beginPath(); ctx.moveTo(cx(xv), PAD.T); ctx.lineTo(cx(xv), CH - PAD.B); ctx.stroke();
  });
  [YZ1, YZ2].forEach(yv => {
    ctx.beginPath(); ctx.moveTo(PAD.L, cy(yv)); ctx.lineTo(CW - PAD.R, cy(yv)); ctx.stroke();
  });
  ctx.restore();

  // ── Main axes ──
  ctx.strokeStyle = COLORS.axis;
  ctx.lineWidth = 1.0;
  ctx.beginPath(); ctx.moveTo(PAD.L, cy(0)); ctx.lineTo(CW - PAD.R, cy(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx(0), PAD.T); ctx.lineTo(cx(0), CH - PAD.B); ctx.stroke();

  // ── Zone corner labels (faint) ──
  ctx.font = `9.5px ${FONT}`;
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(45,90,39,0.45)';
  ctx.fillText('科技产业', CW - PAD.R - 3, PAD.T + 11);
  ctx.fillStyle = 'rgba(26,74,110,0.38)';
  ctx.fillText('法律监管', CW - PAD.R - 3, cy(0) - 4);
  ctx.fillStyle = 'rgba(130,90,10,0.45)';
  ctx.fillText('政治经济', CW - PAD.R - 3, CH - PAD.B - 5);

  // ── X-axis geo labels ──
  ctx.fillStyle = '#999';
  ctx.font = `10.5px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.fillText('中国内', cx(-1.5), CH - PAD.B + 16);
  ctx.fillText('跨境', cx(0), CH - PAD.B + 16);
  ctx.fillText('国际', cx(1.5), CH - PAD.B + 16);

  // ── X axis hint ──
  ctx.fillStyle = '#ccc';
  ctx.font = `9px ${FONT}`;
  ctx.fillText('← 地理维度（示意）→', cx(0), CH - PAD.B + 30);

  // ── Title ──
  ctx.fillStyle = COLORS.brand;
  ctx.font = `bold 13px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.fillText(`本周关键词 · 认知坐标图`, CW / 2, 20);

  ctx.fillStyle = '#ccc';
  ctx.font = `10px ${FONT}`;
  ctx.fillText(`${ISSUE.column} ${ISSUE.vol} · ${ISSUE.period} · 坐标仅示意`, CW / 2, 36);

  // ── Plot border ──
  ctx.strokeStyle = COLORS.border;
  ctx.lineWidth = 1;
  ctx.strokeRect(PAD.L, PAD.T, PW, PH);

  // ── Keywords ──
  KEYWORDS.forEach(([label, x, y]) => {
    const px = cx(x), py = cy(y);
    const c = zoneColor(y);

    // Dot
    ctx.beginPath();
    ctx.arc(px, py, 2.8, 0, Math.PI * 2);
    ctx.fillStyle = c.dot;
    ctx.fill();

    // Label: right-align for x > 0.85, left-align otherwise
    ctx.font = `10px ${FONT}`;
    ctx.fillStyle = c.text;
    if (x > 0.85) {
      ctx.textAlign = 'right';
      ctx.fillText(label, px - 5, py + 3.5);
    } else {
      ctx.textAlign = 'left';
      ctx.fillText(label, px + 5, py + 3.5);
    }
  });

  // ── Bottom footnote ──
  ctx.fillStyle = '#d0ccc4';
  ctx.font = `8.5px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.fillText('坐标位置仅为示意，不代表精确分类 | 未来法域 · 全图', CW / 2, CH - 8);
}

function downloadChart() {
  const dataURL = cv.toDataURL('image/png');

  // Remove any existing overlay
  const existing = document.getElementById('dl-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'dl-overlay';
  overlay.style.cssText = [
    'position:fixed;top:0;left:0;width:100%;height:100%;',
    'background:rgba(0,0,0,0.72);z-index:9999;',
    'display:flex;flex-direction:column;align-items:center;justify-content:center;',
    'padding:20px;box-sizing:border-box;'
  ].join('');

  const panel = document.createElement('div');
  panel.style.cssText = [
    'background:#fff;border-radius:10px;padding:18px;',
    'max-width:680px;width:100%;text-align:center;',
    'box-shadow:0 8px 32px rgba(0,0,0,0.3);'
  ].join('');

  const tip = document.createElement('p');
  tip.style.cssText = 'font-size:13px;color:#555;margin:0 0 12px 0;line-height:1.6;';
  tip.innerHTML = '图片已生成 &nbsp;·&nbsp; <strong>右键图片 → 图片另存为</strong> 即可保存到本地';

  const img = document.createElement('img');
  img.src = dataURL;
  img.style.cssText = [
    'max-width:100%;border:1px solid #e0ddd6;border-radius:6px;',
    'display:block;margin:0 auto;cursor:pointer;'
  ].join('');
  img.title = '右键 → 图片另存为';

  const closeBtn = document.createElement('button');
  closeBtn.textContent = '关闭';
  closeBtn.style.cssText = [
    'margin-top:14px;background:#2d5a27;color:#fff;',
    'border:none;padding:7px 22px;border-radius:4px;',
    'cursor:pointer;font-size:13px;font-weight:600;'
  ].join('');
  closeBtn.onclick = () => overlay.remove();

  panel.appendChild(tip);
  panel.appendChild(img);
  panel.appendChild(closeBtn);
  overlay.appendChild(panel);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function copyBase64() {
  const b64 = cv.toDataURL('image/png');
  navigator.clipboard.writeText(b64).then(() => {
    const btn = document.querySelector('.btn-sec');
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制 Base64', 2000);
  });
}

drawChart();
</script>

</body>
</html>
